services:
  # Сервис PostgreSQL
  postgres:
    image: postgres:15.6
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_flashcards_storage:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - flashcards
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    container_name: flashcards_postgres

  # Сервис FastAPI
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flashcards
    env_file:
      - .env
    container_name: flashcards_backend

volumes:
  postgres_flashcards_storage:

networks:
  flashcards: